services:
  prefect-archival-worker:
    image: prefecthq/prefect:${PREFECT_VERSION}
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    command: [ "prefect", "worker", "start", "--pool", "${PREFECT_ARCHIVAL_WORKPOOL_NAME}", "--type", "docker", "--install-policy", "if-not-present", "--base-job-template", "/var/local/prefect-jobtemplate.json", "--with-healthcheck" ]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8080/health', timeout=1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal
    volumes:
      - ./${PREFECT_JOB_TEMPLATE}:/var/local/prefect-jobtemplate.json
      - /usr/bin/docker:/usr/bin/docker
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Fixes bug in docker/requests package
      - EXTRA_PIP_PACKAGES=requests==2.31.0
      - PREFECT_LOGGING_LEVEL=${PREFECT_LOGGING_LEVEL}
      - PREFECT_API_URL=http://prefect-server:4200/api
    labels:
      traefik.enable: false
  prefect-retrieval-worker:
    image: prefecthq/prefect:${PREFECT_VERSION}
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    command: [ "prefect", "worker", "start", "--pool", "${PREFECT_RETRIEVAL_WORKPOOL_NAME}", "--type", "docker", "--install-policy", "if-not-present", "--base-job-template", "/var/local/prefect-jobtemplate.json", "--with-healthcheck" ]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8080/health', timeout=1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal
    volumes:
      - ./${PREFECT_JOB_TEMPLATE}:/var/local/prefect-jobtemplate.json
      - /usr/bin/docker:/usr/bin/docker
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Fixes bug in docker/requests package
      - EXTRA_PIP_PACKAGES=requests==2.31.0
      - PREFECT_LOGGING_LEVEL=${PREFECT_LOGGING_LEVEL}
      - PREFECT_API_URL=http://prefect-server:4200/api
    labels:
      traefik.enable: false
      
networks:
  internal:
    name: ${ENVIRONMENT}_internal
    external: true