name: Deploy Github Pages


on:
  push:
    branches:
      - main 
  workflow_dispatch:
  workflow_call:


permissions:
  contents: read
  pages: write
  id-token: write
jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v7

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Build Docker image
          uses: docker/build-push-action@v5
          with:
            context: .
            file: ./docs.Dockerfile
            push: false
            load: true
            tags: ghcr.io/swissopenem/scopemarchiver-docs:latest

        - name: Run Docker container
          run: docker run --rm -v ${PWD}:/docs ghcr.io/swissopenem/scopemarchiver-docs:latest build
        
        - name: Upload artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: './.site'
    deploy:
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}

      runs-on: ubuntu-latest
      needs: build
      permissions:
        pages: write
        id-token: write

      steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v5